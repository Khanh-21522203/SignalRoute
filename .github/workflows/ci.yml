name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_dependency_scaffold:
        description: Run manual Redis/PostGIS/Redpanda service scaffold checks
        required: false
        type: boolean
        default: false
      run_adapter_image_scaffold:
        description: Build and smoke-test the fallback-safe adapter image scaffold
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fallback-unit:
    name: fallback unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B /tmp/signalroute-build -DSR_BUILD_TESTS=ON

      - name: Build
        run: cmake --build /tmp/signalroute-build -j2

      - name: Test
        run: ctest --test-dir /tmp/signalroute-build --output-on-failure

  protobuf-unit:
    name: protobuf unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protobuf packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libprotobuf-dev protobuf-compiler

      - name: Configure
        run: cmake -S . -B /tmp/signalroute-protobuf-build -DSR_BUILD_TESTS=ON -DSR_ENABLE_PROTOBUF=ON

      - name: Build
        run: cmake --build /tmp/signalroute-protobuf-build -j2

      - name: Test
        run: ctest --test-dir /tmp/signalroute-protobuf-build --output-on-failure

  asan-ubsan:
    name: asan ubsan smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      ASAN_OPTIONS: detect_leaks=0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B /tmp/signalroute-asan-ubsan-build -DSR_BUILD_TESTS=ON -DSR_ENABLE_ASAN=ON -DSR_ENABLE_UBSAN=ON

      - name: Build focused targets
        run: |
          cmake --build /tmp/signalroute-asan-ubsan-build --target test_admin_http_handler -j2
          cmake --build /tmp/signalroute-asan-ubsan-build --target test_config_loader -j2
          cmake --build /tmp/signalroute-asan-ubsan-build --target test_runtime_application -j2

      - name: Run focused sanitizer smoke
        run: ctest --test-dir /tmp/signalroute-asan-ubsan-build -R 'test_admin_http_handler|test_config_loader|test_runtime_application' --output-on-failure

  dependency-service-scaffold:
    name: dependency service scaffold
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_dependency_scaffold }}
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: signalroute
          POSTGRES_USER: sr_user
          POSTGRES_PASSWORD: sr_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sr_user -d signalroute"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose scaffold
        run: docker compose -f compose.yml config

      - name: Verify Redis service
        run: docker run --rm --network host redis:7.4-alpine redis-cli -h 127.0.0.1 -p 6379 ping

      - name: Verify PostGIS service
        env:
          PGPASSWORD: sr_pass
        run: |
          docker run --rm --network host -e PGPASSWORD postgres:16-alpine \
            pg_isready -h 127.0.0.1 -p 5432 -U sr_user -d signalroute
          docker run --rm --network host -e PGPASSWORD postgres:16-alpine \
            psql -h 127.0.0.1 -p 5432 -U sr_user -d signalroute -c 'SELECT PostGIS_Version();'

      - name: Start Redpanda
        run: |
          docker run -d --name signalroute-redpanda \
            -p 9092:9092 \
            -p 9644:9644 \
            docker.redpanda.com/redpandadata/redpanda:v24.2.7 \
            redpanda start \
              --overprovisioned \
              --smp 1 \
              --memory 512M \
              --reserve-memory 0M \
              --node-id 0 \
              --check=false \
              --kafka-addr PLAINTEXT://0.0.0.0:9092 \
              --advertise-kafka-addr PLAINTEXT://127.0.0.1:9092 \
              --rpc-addr 0.0.0.0:33145 \
              --advertise-rpc-addr 127.0.0.1:33145

      - name: Verify Redpanda service
        run: |
          for attempt in $(seq 1 60); do
            if docker exec signalroute-redpanda rpk cluster info --brokers=127.0.0.1:9092; then
              docker exec signalroute-redpanda rpk topic create signalroute-ci-smoke --brokers=127.0.0.1:9092
              docker exec signalroute-redpanda rpk topic list --brokers=127.0.0.1:9092
              exit 0
            fi
            sleep 2
          done
          docker logs signalroute-redpanda
          exit 1

      - name: Build fallback runtime smoke
        run: |
          cmake -S . -B /tmp/signalroute-dependency-build -DSR_BUILD_TESTS=ON
          cmake --build /tmp/signalroute-dependency-build --target signalroute test_config_loader -j2
          ctest --test-dir /tmp/signalroute-dependency-build -R test_config_loader --output-on-failure

      - name: Stop Redpanda
        if: always()
        run: |
          docker logs signalroute-redpanda || true
          docker rm -f signalroute-redpanda || true

  adapter-image-scaffold:
    name: adapter image scaffold
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_adapter_image_scaffold }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Bake target
        run: docker buildx bake --print adapter-scaffold

      - name: Build adapter scaffold image
        run: docker buildx bake adapter-scaffold

      - name: Verify adapter scaffold binary
        run: docker run --rm --entrypoint /bin/sh signalroute:adapter-scaffold -c 'test -x /usr/local/bin/signalroute'

      - name: Smoke adapter scaffold runtime
        run: |
          set +e
          timeout 3s docker run --rm signalroute:adapter-scaffold \
            --config=/etc/signalroute/signalroute.toml \
            --role=query
          status=$?
          set -e
          if [ "${status}" -ne 124 ]; then
            echo "expected timeout exit 124 after clean SIGTERM, got ${status}"
            exit 1
          fi
