// SignalRoute — Location Event Wire Format
// Used by Ingestion Gateway (producer) and Location Processor (consumer).

syntax = "proto3";

package signalroute;

option cc_enable_arenas = true;

// --- Core Messages ---

// A single GPS location event from a device.
message LocationEvent {
    string  device_id       = 1;     // Unique device identifier
    double  lat             = 2;     // WGS-84 latitude  [-90, 90]
    double  lon             = 3;     // WGS-84 longitude [-180, 180]
    float   altitude_m      = 4;     // Altitude in meters (optional)
    float   accuracy_m      = 5;     // GPS accuracy radius in meters
    float   speed_ms        = 6;     // Speed in meters/second
    float   heading_deg     = 7;     // Heading in degrees [0, 360), 0 = North
    int64   timestamp_ms    = 8;     // Device clock, Unix epoch milliseconds
    int64   server_recv_ms  = 9;     // Gateway receive time (set by server)
    uint64  seq             = 10;    // Monotonically increasing per device
    map<string, string> metadata = 11; // Arbitrary key-value telemetry
}

// A batch of events from a single device.
message LocationBatch {
    string device_id            = 1;
    repeated LocationEvent events = 2;
}

// --- Ingestion Gateway API ---

message IngestBatchRequest {
    LocationBatch batch = 1;
}

message IngestBatchResponse {
    int32  accepted  = 1;    // Number of events accepted
    int32  rejected  = 2;    // Number of events rejected
    string reason    = 3;    // If rejected > 0, human-readable reason
}

message IngestSingleRequest {
    LocationEvent event = 1;
}

message IngestSingleResponse {
    bool   ok     = 1;
    string reason = 2;
}

// Ingestion Gateway gRPC service.
service IngestService {
    // Ingest a batch of events from a single device.
    rpc IngestBatch(IngestBatchRequest) returns (IngestBatchResponse);

    // Ingest a single event (convenience).
    rpc IngestSingle(IngestSingleRequest) returns (IngestSingleResponse);
}
