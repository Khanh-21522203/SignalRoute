[server]
port = 8080
log_level = "info"

[kafka]
brokers = "localhost:9092"
location_topic = "tm.location.events"
location_dlq = "tm.location.dlq"
geofence_topic = "tm.geofence.events"

[redis]
host = "127.0.0.1"
port = 6379
pool_size = 32

[postgres]
connection_string = "postgresql://postgres:postgres@localhost:5432/signalroute"
pool_size = 16

[spatial]
h3_resolution_agent = 9
h3_resolution_fence = 9
default_search_radius_m = 5000.0
max_search_radius_m = 20000.0
nearby_max_results = 200

[geofence]
enabled = true
preload_fences_on_startup = true
reload_interval_s = 60

[gateway]
max_batch_events = 200
timestamp_skew_tolerance_s = 300

[processor]
num_workers = 4
batch_size = 50
flush_interval_ms = 100

[matching]
enabled = true
request_topic = "tm.matching.requests"
result_topic = "tm.matching.results"
strategy = "nearest"

[observability]
prometheus_port = 9090
enable_tracing = false
